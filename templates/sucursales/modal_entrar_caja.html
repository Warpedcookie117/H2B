<h2 class="text-xl font-black mb-1 uppercase tracking-widest">Entrar a caja</h2>
<p class="font-black text-sm uppercase tracking-widest text-gray-500 mb-4">{{ nombre }}</p>

<form id="formEntrarCaja" class="space-y-3">
  {% csrf_token %}
  <input type="hidden" name="caja_id" value="{{ caja_id }}">

  <div>
    <label class="block text-xs font-black uppercase tracking-widest text-gray-700 mb-1">
      Tu contraseña
    </label>
    <input name="password"
           type="password"
           autofocus
           class="w-full border-4 border-black px-3 py-2 font-semibold text-gray-900 outline-none"
           placeholder="••••••••">
  </div>

  <p id="modalCajaError" class="text-[#FF006E] text-sm font-black hidden"></p>

  <div class="flex gap-3 pt-1">
    <button type="button"
            id="modalCajaCancelar"
            class="btn-90s flex-1 bg-gray-200 border-4 border-black shadow-[4px_4px_0_0_black]
                   font-black text-xs uppercase tracking-widest py-2">
      Cancelar
    </button>
    <button type="submit"
            class="btn-90s flex-1 bg-[#06D6A0] border-4 border-black shadow-[4px_4px_0_0_black]
                   text-black font-black text-xs uppercase tracking-widest py-2">
      Entrar
    </button>
  </div>
</form>
