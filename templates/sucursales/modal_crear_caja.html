<form id="formCrearCaja">

    {% csrf_token %}

    <label class="block font-bold mb-1">Nombre:</label>

    <input 
        type="text"
        name="nombre"
        value="{{ form.nombre.value|default:'' }}"
        placeholder="Ej. Caja Anais"
        class="w-full border-2 border-black p-2 mb-3"
    >

    {% if form.nombre.errors %}
        <p class="text-red-600 text-sm mb-2">{{ form.nombre.errors.0 }}</p>
    {% endif %}

    <div class="flex flex-col gap-2 mt-4">
        <button type="button"
                id="modalCrearCajaGuardar"
                class="w-full py-2 font-black border-2 border-black text-white"
                style="background: #0099FF;">
            Guardar
        </button>

        <button type="button"
                id="modalCrearCajaCancelar"
                class="w-full bg-gray-300 py-2 font-bold border-2 border-black">
            Cancelar
        </button>
    </div>

</form>
