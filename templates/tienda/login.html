{% extends 'partials/base.html' %}
{% block title %}Iniciar Sesión{% endblock %}

{% block content %}

<section class="flex justify-center items-center min-h-screen px-4 py-10">

  <div class="bg-white border-4 border-black shadow-[8px_8px_0_0_black]
              rounded-xl p-8 w-full max-w-sm relative overflow-hidden">

    <!-- Decoración estilo dashboard -->
    <div class="absolute -top-3 left-3 w-10 h-10 bg-[#FFBE0B] rotate-45 opacity-40"></div>
    <div class="absolute -bottom-3 right-3 w-10 h-10 bg-[#3A86FF] rotate-45 opacity-40"></div>

    <h2 class="text-3xl font-black text-center text-black uppercase mb-6 tracking-wide">
      Iniciar Sesión
    </h2>

    <!-- 🔥 MENSAJES DENTRO DE LA CARD -->
    {% if messages %}
      {% for message in messages %}
        <div class="
          alert-90s
          mb-4 px-4 py-3 border-4 border-black rounded-lg
          shadow-[6px_6px_0_0_black] font-black text-sm uppercase tracking-wide
          animate-fade-in transition-all duration-500

          {% if message.tags == 'error' %}
            bg-[#FF006E] text-white
          {% elif message.tags == 'success' %}
            bg-[#06D6A0] text-black
          {% else %}
            bg-[#FFD166] text-black
          {% endif %}
        ">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'tienda_temp:login' %}" class="space-y-4">
      {% csrf_token %}

      <!-- Usuario -->
      <div>
        <label for="username" class="block text-left font-black text-gray-800 uppercase text-sm">
          Usuario / Correo / Número
        </label>
        <input type="text" id="username" name="username"
               autocomplete="username"
               class="w-full border-4 border-black px-3 py-2 rounded-md
                      focus:outline-none focus:ring-0 focus:border-[#3A86FF]
                      transition-all"
               required>
      </div>

      <!-- Contraseña -->
      <div>
        <label for="password" class="block text-left font-black text-gray-800 uppercase text-sm">
          Contraseña
        </label>
        <input type="password" id="password" name="password"
               autocomplete="current-password"
               class="w-full border-4 border-black px-3 py-2 rounded-md
                      focus:outline-none focus:ring-0 focus:border-[#3A86FF]
                      transition-all"
               required>
      </div>

      <!-- Botón principal -->
      <button type="submit"
              class="w-full bg-[#FF006E] text-white font-black uppercase border-4 border-black
                     py-3 rounded-md shadow-[6px_6px_0_0_black]
                     hover:-translate-x-1 hover:-translate-y-1 hover:shadow-[8px_8px_0_0_black]
                     transition-all duration-150">
        Entrar →
      </button>
    </form>

    <!-- Botones secundarios responsivos -->
    <div class="mt-6 flex flex-col sm:flex-row gap-3">

      <a href="{% url 'tienda_temp:registro_cliente' %}"
         class="flex-1 text-center bg-[#FFBE0B] text-black font-black uppercase text-xs sm:text-sm
                border-4 border-black py-2 rounded-md shadow-[4px_4px_0_0_black]
                hover:-translate-x-1 hover:-translate-y-1 hover:shadow-[6px_6px_0_0_black]
                transition-all duration-150">
        Registrarse
      </a>

      <a href="#"
         class="flex-1 text-center bg-white text-black font-black uppercase text-xs sm:text-sm
                border-4 border-black py-2 rounded-md shadow-[4px_4px_0_0_black]
                hover:bg-gray-100 hover:-translate-x-1 hover:-translate-y-1 hover:shadow-[6px_6px_0_0_black]
                transition-all duration-150">
        ¿Olvidaste tu contraseña?
      </a>

    </div>

  </div>

</section>

<!-- 🔥 Animación retro -->
<style>
@keyframes fadeIn90s {
  0% { opacity: 0; transform: translateY(-10px); }
  60% { opacity: 1; transform: translateY(2px); }
  100% { transform: translateY(0); }
}
.animate-fade-in {
  animation: fadeIn90s 0.35s ease-out;
}
</style>

<!-- 🔥 Auto-desvanecimiento -->
<script>
document.addEventListener("DOMContentLoaded", () => {
    const alerts = document.querySelectorAll(".alert-90s");

    alerts.forEach((msg) => {
        setTimeout(() => {
            msg.style.opacity = "0";
            msg.style.transform = "translateY(-10px)";
        }, 2500);

        setTimeout(() => {
            msg.remove();
        }, 3500);
    });
});
</script>

{% endblock %}
