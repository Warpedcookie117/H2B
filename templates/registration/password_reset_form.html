{% extends 'partials/base.html' %}
{% block title %}Recuperar Contraseña{% endblock %}

{% block content %}
<section class="flex justify-center items-center min-h-screen px-4 py-10">
  <div class="bg-white border-4 border-black shadow-[8px_8px_0_0_black] rounded-xl p-8 w-full max-w-sm relative overflow-hidden">

    <div class="absolute -top-3 left-3 w-10 h-10 bg-[#FFBE0B] rotate-45 opacity-40"></div>
    <div class="absolute -bottom-3 right-3 w-10 h-10 bg-[#3A86FF] rotate-45 opacity-40"></div>

    <div class="text-center mb-6">
      <span class="text-5xl">🔑</span>
      <h2 class="text-3xl font-black text-black uppercase mt-2 tracking-wide">
        ¿Olvidaste tu contraseña?
      </h2>
      <p class="text-sm font-semibold text-gray-600 mt-2">
        Ingresa tu correo y te mandamos un link para recuperarla.
      </p>
    </div>

    <form method="POST" class="space-y-4">
      {% csrf_token %}
      <div>
        <label class="block text-left font-black text-gray-800 uppercase text-sm mb-1">
          Correo electrónico
        </label>
        <input type="email" name="email" required autofocus
               class="w-full border-4 border-black px-3 py-2 rounded-md focus:outline-none focus:border-[#3A86FF] transition-all"
               placeholder="tu@correo.com">
      </div>

      <button type="submit"
              class="w-full bg-[#FFBE0B] text-black font-black uppercase border-4 border-black
                     py-3 rounded-md shadow-[6px_6px_0_0_black]
                     hover:-translate-x-1 hover:-translate-y-1 hover:shadow-[8px_8px_0_0_black]
                     transition-all duration-150">
        Enviar link →
      </button>
    </form>

    <div class="mt-6">
      <a href="{% url 'tienda_temp:login' %}"
         class="block text-center bg-white text-black font-black uppercase text-xs
                border-4 border-black py-2 rounded-md shadow-[4px_4px_0_0_black]
                hover:bg-gray-100 hover:-translate-x-1 hover:-translate-y-1 hover:shadow-[6px_6px_0_0_black]
                transition-all duration-150">
        ← Volver al login
      </a>
    </div>

  </div>
</section>
{% endblock %}
