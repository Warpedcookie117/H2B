{% extends 'partials/base.html' %}
{% block title %}Contraseña Restablecida{% endblock %}

{% block content %}
<section class="flex justify-center items-center min-h-screen px-4 py-10">
  <div class="bg-white border-4 border-black shadow-[8px_8px_0_0_black] rounded-xl p-8 w-full max-w-sm relative overflow-hidden text-center">

    <div class="absolute -top-3 left-3 w-10 h-10 bg-[#06D6A0] rotate-45 opacity-40"></div>
    <div class="absolute -bottom-3 right-3 w-10 h-10 bg-[#FFBE0B] rotate-45 opacity-40"></div>

    <span class="text-6xl">✅</span>
    <h2 class="text-3xl font-black text-black uppercase mt-4 tracking-wide">
      ¡Contraseña cambiada!
    </h2>
    <p class="text-sm font-semibold text-gray-600 mt-3">
      Tu contraseña se restableció correctamente. Ya puedes iniciar sesión.
    </p>

    <div class="mt-6 border-4 border-black shadow-[4px_4px_0_0_black] bg-[#06D6A0] px-5 py-3">
      <p class="font-black text-black uppercase text-xs tracking-widest">
        No compartas tu contraseña con nadie 🔒
      </p>
    </div>

    <a href="{% url 'tienda_temp:login' %}"
       class="mt-6 block text-center bg-[#FF006E] text-white font-black uppercase
              border-4 border-black py-3 rounded-md shadow-[6px_6px_0_0_black]
              hover:-translate-x-1 hover:-translate-y-1 hover:shadow-[8px_8px_0_0_black]
              transition-all duration-150">
      Iniciar sesión →
    </a>

  </div>
</section>
{% endblock %}
