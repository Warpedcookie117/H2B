<form method="POST"
      action="{% if categoria %}{% url 'inventario:categoria_guardar' categoria.id %}{% else %}{% url 'inventario:categoria_guardar_nueva' %}{% endif %}"
      onsubmit="enviarCategoria(event)">

  {% csrf_token %}

  <!-- TÍTULO -->
  <div class="border-b-4 border-black pb-3 mb-5">
    <h2 class="text-xl font-black text-gray-900 uppercase tracking-widest">
      {% if categoria %}✏️ Editar categoría{% else %}➕ Nueva categoría padre{% endif %}
    </h2>
  </div>

  <!-- NOMBRE -->
  <div class="space-y-1 mb-4">
    <label class="text-xs font-black uppercase tracking-widest text-gray-700">Nombre</label>
    <div class="border-4 border-black shadow-[4px_4px_0_0_black] focus-within:shadow-[6px_6px_0_0_black] transition-all">
      {{ form.nombre }}
    </div>
    {% if form.nombre.errors %}
    <p class="text-xs font-black text-[#FF006E] uppercase">⚠️ {{ form.nombre.errors.0 }}</p>
    {% endif %}
  </div>

  <!-- DESCRIPCIÓN -->
  <div class="space-y-1 mb-6">
    <label class="text-xs font-black uppercase tracking-widest text-gray-700">Descripción</label>
    <div class="border-4 border-black shadow-[4px_4px_0_0_black] focus-within:shadow-[6px_6px_0_0_black] transition-all">
      {{ form.descripcion }}
    </div>
    {% if form.descripcion.errors %}
    <p class="text-xs font-black text-[#FF006E] uppercase">⚠️ {{ form.descripcion.errors.0 }}</p>
    {% endif %}
  </div>

  <!-- BOTONES -->
  <div class="flex justify-end gap-3">
    <button type="button"
            onclick="closeModal('modalCategoria')"
            class="btn-90s bg-gray-200 border-4 border-black shadow-[4px_4px_0_0_black]
                   font-black text-xs uppercase tracking-widest px-4 py-2">
      Cancelar
    </button>
    <button type="submit"
            class="btn-90s bg-[#8338EC] border-4 border-black shadow-[4px_4px_0_0_black]
                   text-white font-black text-xs uppercase tracking-widest px-4 py-2">
      Guardar
    </button>
  </div>

</form>
