<!-- MODAL TRANSFERIR MÚLTIPLE -->
<div id="modalTransferirMultiple" class="modal-90s hidden">
  <div id="modalTransferirMultipleContent"
       class="modal-box modal-box-wide opacity-0 scale-95 transition-all duration-200"
       style="background-color: {{ color_header }};">

    <div class="border-b-4 border-black pb-3 mb-4 px-2 py-2 -mx-2 -mt-2 rounded-sm" style="background-color: black;">
      <h2 class="text-xl font-black text-white uppercase tracking-widest">⇄ Transferencia múltiple</h2>
      <p class="text-[10px] font-black uppercase tracking-widest text-white/60 mt-1">
        Origen: {{ ubicacion.nombre }}
        {% if ubicacion.sucursal %} — {{ ubicacion.sucursal.nombre }}{% endif %}
      </p>
    </div>

    <!-- BUSCADOR -->
    <div class="mb-4">
      <label class="modal-label">Escanea o escribe el nombre / código del producto</label>
      <input id="transferir_multiple_search"
             type="text"
             placeholder="Busca aquí..."
             class="modal-input"
             oninput="buscarProductoMultiple(event)">
    </div>

    <!-- RESULTADOS -->
    <div id="transferir_multiple_resultados"
         class="hidden border-4 border-black bg-white mb-4 max-h-48 overflow-y-auto">
    </div>

    <!-- TABLA DE PRODUCTOS SELECCIONADOS -->
    <div class="mb-4 overflow-x-auto border-4 border-black">
      <table class="w-full text-left min-w-[500px]">
        <thead class="bg-black text-white">
          <tr>
            <th class="py-2 px-3 text-xs font-black uppercase tracking-widest">Producto</th>
            <th class="py-2 px-3 text-xs font-black uppercase tracking-widest">Disponible aquí</th>
            <th class="py-2 px-3 text-xs font-black uppercase tracking-widest">¿Cuántas mover?</th>
            <th class="py-2 px-3"></th>
          </tr>
        </thead>
        <tbody id="transferir_multiple_tabla" class="divide-y-4 divide-black"></tbody>
      </table>
    </div>

    <!-- DESTINO -->
    <div class="mb-4">
      <label class="modal-label">¿A dónde van todos estos productos?</label>
      <select id="transferir_multiple_destino" class="modal-select">
        {% for u in ubicaciones %}
          {% if u.id != ubicacion.id %}
          <option value="{{ u.id }}">{{ u.nombre }}{% if u.sucursal %} — {{ u.sucursal.nombre }}{% endif %}</option>
          {% endif %}
        {% endfor %}
      </select>
    </div>

    <input type="hidden" id="transferir_multiple_origen_id" value="">

    <div class="modal-error hidden"></div>

    <div class="flex justify-end gap-3 pt-2">
      <button type="button"
              onclick="cerrarModal('modalTransferirMultiple')"
              class="modal-btn modal-btn-cancel">
        Cancelar
      </button>
      <button type="button"
              onclick="confirmarTransferirMultiple(event)"
              class="modal-btn modal-btn-primary">
        Transferir todo
      </button>
    </div>

  </div>
</div>
