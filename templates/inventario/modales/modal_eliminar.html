<div id="modalEliminar" class="modal-90s hidden">
  <div id="modalEliminarContent"
       class="modal-box opacity-0 scale-95 transition-all duration-200">

    <div class="border-b-4 border-black pb-3 mb-4">
      <h2 id="modalEliminarTitulo"
          class="text-xl font-black text-black uppercase tracking-widest">
        Confirmar
      </h2>
    </div>

    <p id="modalEliminarMensaje"
       class="text-sm font-semibold text-black mb-4 whitespace-pre-line"></p>

    <input type="hidden" id="eliminar_producto_id">
    <input type="hidden" id="eliminar_ubicacion_id">
    <input type="hidden" id="eliminar_tipo">

    <div id="campo_motivo" class="hidden mb-4">
      <label class="modal-label">
        Motivo de desactivación <span class="text-[#FF006E]">*</span>
      </label>
      <textarea id="motivo_desactivacion"
                rows="3"
                maxlength="300"
                placeholder="Ej: Producto de temporada, sin stock, descontinuado..."
                class="modal-input resize-none"></textarea>
    </div>

    <div class="flex justify-end gap-3 pt-2">
      <button onclick="cerrarModal('modalEliminar')"
              class="modal-btn modal-btn-cancel">
        Cancelar
      </button>
      <button id="btn_confirmar_eliminar"
              onclick="confirmarEliminar()"
              class="modal-btn bg-[#FF006E] border-4 border-black text-white">
        Confirmar
      </button>
    </div>

  </div>
</div>
